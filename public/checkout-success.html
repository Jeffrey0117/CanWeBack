<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Can We Back? | 付款成功</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 20px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 32px;
      backdrop-filter: blur(10px);
    }
    .success-icon {
      width: 80px; height: 80px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(0,184,148,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.4rem;
      color: #00b894;
      margin-bottom: 8px;
    }
    .desc {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #f5c842;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { color: #f5c842; font-size: 0.9rem; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #f5c842, #ff6b6b);
      color: #1a1a2e;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,200,66,0.3); }
    .error { color: #d63031; font-size: 0.9rem; margin-bottom: 20px; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="card" id="content">
      <div class="success-icon">&#x2705;</div>
      <h1>付款成功!</h1>
      <p class="desc">感謝購買，正在為你準備內容...</p>
      <div class="status" id="status"><span class="spinner"></span>確認付款中...</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const orderId = params.get('orderId')
    const type = params.get('type') // 'report' or 'plan'

    async function confirmAndRedirect() {
      if (!orderId) {
        document.getElementById('status').innerHTML = '<span class="error">缺少訂單資訊</span>'
        return
      }

      try {
        // Confirm payment on server
        await fetch('/api/confirm-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, type }),
        })

        document.getElementById('status').textContent = '即將跳轉...'

        // Redirect based on type
        setTimeout(() => {
          if (type === 'plan') {
            window.location.href = '/plan.html?id=' + orderId
          } else {
            // For report: go back to main page which will show full report
            window.location.href = '/report.html?id=' + orderId
          }
        }, 1500)
      } catch (err) {
        document.getElementById('status').innerHTML =
          '<span class="error">確認失敗，請重新整理頁面</span>'
      }
    }

    confirmAndRedirect()
  </script>
</body>
</html>
