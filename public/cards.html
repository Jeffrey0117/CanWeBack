<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>失戀語錄牌 | Can We Back?</title>
  <meta name="description" content="翻一張牌，看看哪句話說中了你的心。失戀語錄牌，每一句都是某個人的真實心聲。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .stars {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0;
    }
    .stars::before, .stars::after {
      content: ''; position: absolute;
      width: 2px; height: 2px; border-radius: 50%; background: white;
      box-shadow:
        25px 50px white, 100px 120px white, 200px 80px white,
        350px 200px white, 50px 300px white, 180px 350px white,
        400px 100px white, 300px 400px white, 150px 180px white,
        450px 320px white, 80px 420px white, 320px 50px white,
        500px 250px white, 250px 500px white, 420px 450px white,
        550px 150px white, 600px 350px white, 700px 200px white;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    .stars::after {
      width: 1px; height: 1px;
      box-shadow:
        75px 150px rgba(255,255,255,0.6), 250px 220px rgba(255,255,255,0.6),
        450px 50px rgba(255,255,255,0.6), 120px 400px rgba(255,255,255,0.6),
        500px 380px rgba(255,255,255,0.6), 300px 150px rgba(255,255,255,0.6);
      animation: twinkle 3s ease-in-out infinite alternate-reverse;
    }
    @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }

    .container {
      max-width: 600px; margin: 0 auto; padding: 40px 20px;
      position: relative; z-index: 1;
    }

    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #f5c842, #ff6b6b, #c56cf0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: #888; font-size: 0.9rem; }

    .counter {
      text-align: center; margin-bottom: 24px;
      font-size: 0.85rem; color: #666;
    }
    .counter span { color: #f5c842; font-weight: 700; }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    /* Flip card */
    .flip-card {
      aspect-ratio: 3/4;
      perspective: 800px;
      cursor: pointer;
    }
    .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
    .flip-card.flipped { cursor: default; }

    .flip-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flip-front, .flip-back {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      padding: 12px;
    }

    /* Front: mystery card */
    .flip-front {
      background: linear-gradient(135deg, rgba(197,108,240,0.15), rgba(108,92,231,0.15));
      border: 1px solid rgba(197,108,240,0.3);
    }
    .flip-front::before {
      content: '?';
      font-size: 2.4rem; font-weight: 800;
      color: rgba(197,108,240,0.4);
    }
    .flip-card:not(.flipped):hover .flip-front {
      border-color: rgba(245,200,66,0.5);
      box-shadow: 0 0 20px rgba(245,200,66,0.15);
    }
    .flip-card:not(.flipped):active .flip-front {
      transform: scale(0.96);
    }

    /* Back: quote */
    .flip-back {
      transform: rotateY(180deg);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      flex-direction: column;
      text-align: center;
      gap: 8px;
    }
    .flip-back .quote {
      font-size: 0.82rem;
      line-height: 1.7;
      color: #eee;
      font-weight: 500;
    }
    .flip-back .card-tag {
      font-size: 0.65rem;
      color: #c56cf0;
      opacity: 0.7;
    }

    /* Color variants for backs */
    .flip-card[data-color="warm"] .flip-back { border-color: rgba(245,200,66,0.2); background: rgba(245,200,66,0.04); }
    .flip-card[data-color="warm"] .flip-back .quote { color: #f5e6c8; }
    .flip-card[data-color="cool"] .flip-back { border-color: rgba(108,92,231,0.2); background: rgba(108,92,231,0.04); }
    .flip-card[data-color="cool"] .flip-back .quote { color: #d0c8f0; }
    .flip-card[data-color="pink"] .flip-back { border-color: rgba(255,107,107,0.2); background: rgba(255,107,107,0.04); }
    .flip-card[data-color="pink"] .flip-back .quote { color: #f5c8c8; }
    .flip-card[data-color="mint"] .flip-back { border-color: rgba(0,184,148,0.2); background: rgba(0,184,148,0.04); }
    .flip-card[data-color="mint"] .flip-back .quote { color: #c8f0e8; }

    /* Reveal animation */
    @keyframes cardReveal {
      0% { opacity: 0; transform: rotateY(180deg) scale(0.8); }
      100% { opacity: 1; transform: rotateY(180deg) scale(1); }
    }
    .flip-card.flipped .flip-back { animation: cardReveal 0.3s ease-out 0.3s both; }

    /* All flipped CTA */
    .result-section {
      display: none;
      text-align: center;
      animation: fadeUp 0.6s ease-out;
    }
    .result-section.show { display: block; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .result-section .result-text {
      font-size: 1.1rem; color: #fff;
      margin-bottom: 8px; font-weight: 600;
    }
    .result-section .result-sub {
      font-size: 0.85rem; color: #999;
      margin-bottom: 24px; line-height: 1.6;
    }

    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }

    .cta-btn {
      display: inline-block; padding: 14px 32px;
      background: linear-gradient(135deg, #f5c842, #ff6b6b);
      color: #1a1a2e; border-radius: 12px; text-decoration: none;
      font-weight: 700; font-size: 0.95rem; transition: all 0.3s;
      border: none; cursor: pointer;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,200,66,0.3); }

    .shuffle-btn {
      display: inline-block; padding: 14px 32px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ccc; border-radius: 12px;
      font-weight: 600; font-size: 0.95rem; transition: all 0.3s;
      cursor: pointer;
    }
    .shuffle-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* Card inline CTA */
    .card-cta {
      font-size: 0.6rem;
      color: #f5c842;
      text-decoration: none;
      opacity: 0;
      transition: opacity 0.4s ease 0.6s;
      pointer-events: none;
    }
    .flip-card.flipped .card-cta {
      opacity: 0.8;
      pointer-events: auto;
    }
    .flip-card.flipped .card-cta:hover { opacity: 1; }

    /* Resonance button */
    .resonance-row {
      display: flex; align-items: center; gap: 6px;
      opacity: 0; transition: opacity 0.4s ease 0.8s;
      pointer-events: none;
      margin-top: 2px;
    }
    .flip-card.flipped .resonance-row {
      opacity: 1; pointer-events: auto;
    }
    .resonate-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.72rem; color: #ff6b6b; padding: 2px 6px;
      border-radius: 12px; transition: all 0.3s;
      display: flex; align-items: center; gap: 3px;
    }
    .resonate-btn:hover { background: rgba(255,107,107,0.12); }
    .resonate-btn.active { color: #ff6b6b; }
    .resonate-btn.active .heart-icon { transform: scale(1.3); }
    .heart-icon { transition: transform 0.3s; display: inline-block; }
    .resonate-count { font-size: 0.6rem; color: #888; }

    /* Save card button */
    .save-card-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.6rem; color: #888; padding: 2px 6px;
      border-radius: 12px; transition: all 0.3s;
      opacity: 0; pointer-events: none;
    }
    .flip-card.flipped .save-card-btn {
      opacity: 0.7; pointer-events: auto;
    }
    .save-card-btn:hover { color: #f5c842; opacity: 1; }

    /* Hidden canvas for card export */
    #exportCanvas { display: none; }

    /* Floating CTA */
    .floating-cta {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 14px 20px;
      background: linear-gradient(to top, rgba(10,10,26,0.98) 60%, transparent);
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .floating-cta.show { transform: translateY(0); }
    .floating-cta a {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #f5c842, #ff6b6b);
      color: #1a1a2e;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(245,200,66,0.3);
    }
    .floating-cta a:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,200,66,0.4); }

    .footer {
      text-align: center; margin-top: 40px; padding-bottom: 70px;
      color: #555; font-size: 0.8rem;
    }
    .footer a { color: #f5c842; text-decoration: none; }

    @media (max-width: 380px) {
      .card-grid { gap: 10px; }
      .flip-back .quote { font-size: 0.75rem; }
      .card-cta { font-size: 0.55rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="stars"></div>
  <div class="container">
    <div class="header">
      <h1>失戀語錄牌</h1>
      <p>翻開每一張，看看哪句話說中了你</p>
    </div>

    <div class="counter">已翻開 <span id="flippedCount">0</span> / <span id="totalCount">9</span></div>

    <div class="card-grid" id="cardGrid"></div>

    <div class="result-section" id="resultSection">
      <p class="result-text">每一句，都是某個人深夜寫下的真心話。</p>
      <p class="result-sub">如果有一句說中了你，也許你心裡還住著那個人。</p>
      <div class="btn-row">
        <a href="/" class="cta-btn">測你的挽回指數</a>
        <button class="shuffle-btn" onclick="reshuffle()">再抽一輪</button>
      </div>
    </div>

    <div class="footer">
      <a href="/blog.html">失戀急診室</a> &middot; <a href="/">挽回分析</a>
      <p style="margin-top:12px">Can We Back? &copy; 2026</p>
    </div>
  </div>

  <canvas id="exportCanvas" width="1080" height="1350"></canvas>

  <div class="floating-cta" id="floatingCta">
    <a href="/">說中你了？測測挽回指數 &rarr;</a>
  </div>

  <script>
    const allQuotes = [
      { text: '我很想念的\n是剛認識的你\n跟剛認識你的我自己', tag: '想念', color: 'warm' },
      { text: '愛 不用改變自己 委屈自己\n把自己塑造成和以前不一樣的人\n應該是要一起變得更強大', tag: '成長', color: 'mint' },
      { text: '愛是找一個人來分享生活\n而不是找一個人來填補生活', tag: '領悟', color: 'cool' },
      { text: '後來我才明白\n不是所有的喜歡\n都能等到一個結果', tag: '釋懷', color: 'pink' },
      { text: '你走以後\n我學會了一個人吃飯\n卻還是會點兩個人的份量', tag: '習慣', color: 'warm' },
      { text: '我不是不會笑了\n只是笑的時候\n不再第一個想跟你分享', tag: '失落', color: 'pink' },
      { text: '最難過的不是你離開了\n是我還在用你教我的方式\n去愛下一個人', tag: '印記', color: 'cool' },
      { text: '我刪了你的聊天記錄\n卻刪不掉\n打字時還想找你的本能', tag: '本能', color: 'pink' },
      { text: '分手那天你說的每句話\n我都記得\n包括你說的「你會找到更好的」', tag: '記憶', color: 'warm' },
      { text: '我以為時間會治癒一切\n結果時間只是讓我\n更擅長假裝沒事', tag: '偽裝', color: 'cool' },
      { text: '你知道最殘忍的是什麼嗎\n是我還在等\n而你已經不會來了', tag: '等待', color: 'pink' },
      { text: '我把你的東西都還了\n只留下了\n看到情侶就心酸的毛病', tag: '後遺症', color: 'warm' },
      { text: '那些說「分手後可以做朋友」的人\n大概沒有真正愛過吧', tag: '愛過', color: 'pink' },
      { text: '如果可以回到那天\n我不會說沒關係\n我會說 拜託你留下來', tag: '如果', color: 'cool' },
      { text: '我終於知道\n為什麼深夜的歌\n每一首都像在唱我的故事', tag: '深夜', color: 'warm' },
      { text: '你離開以後\n我才發現\n原來一個人的房間可以這麼安靜', tag: '安靜', color: 'mint' },
      { text: '我不怕一個人\n我怕的是\n在人群中想起你的那種孤獨', tag: '孤獨', color: 'cool' },
      { text: '你說我們不適合\n但你有沒有想過\n也許只是我們還不夠努力', tag: '不甘', color: 'pink' },
      { text: '愛一個人最卑微的樣子\n就是他已讀不回\n你還在想是不是自己說錯話了', tag: '卑微', color: 'warm' },
      { text: '我把對你的思念\n藏進每一個加班的夜晚\n假裝是因為工作才睡不著', tag: '藏匿', color: 'mint' },
      { text: '分手後我最怕聽到的一句話\n不是他有新對象了\n而是「你還好嗎」', tag: '崩潰', color: 'pink' },
      { text: '我以為放下是一瞬間的事\n原來放下\n是每天都要做一次的決定', tag: '放下', color: 'cool' },
      { text: '謝謝你讓我知道\n原來心真的會痛\n不是比喻 是真的會痛', tag: '心痛', color: 'pink' },
      { text: '最諷刺的是\n教會我什麼是愛的人\n也教會了我什麼是失去', tag: '諷刺', color: 'cool' },
      { text: '你離開的那天下著雨\n後來我每次聽到雨聲\n都以為你要回來了', tag: '錯覺', color: 'mint' },
      { text: '我不是放不下你\n我是放不下\n那個為你全力以赴的自己', tag: '自己', color: 'warm' },
      { text: '你轉身的時候\n我以為你會回頭\n結果連影子都沒留給我', tag: '轉身', color: 'pink' },
    ]

    const CARD_COUNT = 9
    let flippedCount = 0

    function shuffle(arr) {
      const a = [...arr]
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        ;[a[i], a[j]] = [a[j], a[i]]
      }
      return a
    }

    function renderCards() {
      const grid = document.getElementById('cardGrid')
      const selected = shuffle(allQuotes).slice(0, CARD_COUNT)
      flippedCount = 0
      document.getElementById('flippedCount').textContent = '0'
      document.getElementById('totalCount').textContent = String(CARD_COUNT)
      document.getElementById('resultSection').classList.remove('show')
      grid.innerHTML = ''

      selected.forEach((q, i) => {
        const card = document.createElement('div')
        card.className = 'flip-card'
        card.setAttribute('data-color', q.color)
        const fakeCount = Math.floor(Math.random() * 4000) + 1200
        card.innerHTML = `
          <div class="flip-inner">
            <div class="flip-front"></div>
            <div class="flip-back">
              <div class="quote">${q.text.replace(/\n/g, '<br>')}</div>
              <div class="card-tag">#${q.tag}</div>
              <div class="resonance-row">
                <button class="resonate-btn" onclick="event.stopPropagation();resonateCard(this)" data-count="${fakeCount}">
                  <span class="heart-icon">&hearts;</span> 說中我了
                </button>
                <span class="resonate-count">${fakeCount.toLocaleString()} 人也是</span>
              </div>
              <button class="save-card-btn" onclick="event.stopPropagation();saveCard(this, '${q.text.replace(/'/g, "\\'")}', '${q.tag}', '${q.color}')">保存這張卡</button>
              <a href="/" class="card-cta">測挽回指數 &rarr;</a>
            </div>
          </div>
        `
        card.addEventListener('click', () => flipCard(card))
        // Stagger entrance
        card.style.opacity = '0'
        card.style.transform = 'translateY(20px)'
        setTimeout(() => {
          card.style.transition = 'opacity 0.4s ease, transform 0.4s ease'
          card.style.opacity = '1'
          card.style.transform = 'translateY(0)'
        }, i * 60)
        grid.appendChild(card)
      })
    }

    function flipCard(card) {
      if (card.classList.contains('flipped')) return
      card.classList.add('flipped')
      flippedCount++
      document.getElementById('flippedCount').textContent = String(flippedCount)

      // Show floating CTA after first flip
      if (flippedCount === 1) {
        setTimeout(() => {
          document.getElementById('floatingCta').classList.add('show')
        }, 1000)
      }

      if (flippedCount === CARD_COUNT) {
        setTimeout(() => {
          document.getElementById('resultSection').classList.add('show')
        }, 800)
      }
    }

    function reshuffle() {
      document.getElementById('floatingCta').classList.remove('show')
      renderCards()
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    function resonateCard(btn) {
      if (btn.classList.contains('active')) return
      btn.classList.add('active')
      const count = parseInt(btn.dataset.count) + 1
      btn.dataset.count = count
      const countEl = btn.parentElement.querySelector('.resonate-count')
      countEl.textContent = count.toLocaleString() + ' 人也是'
      // Little pulse animation
      btn.querySelector('.heart-icon').style.transform = 'scale(1.5)'
      setTimeout(() => { btn.querySelector('.heart-icon').style.transform = 'scale(1.3)' }, 200)
    }

    function saveCard(btn, text, tag, color) {
      const canvas = document.getElementById('exportCanvas')
      const ctx = canvas.getContext('2d')
      const w = 1080, h = 1350

      // Background gradient based on color
      const gradients = {
        warm: ['#1a1008', '#2a1a0a'],
        cool: ['#0a0a1a', '#12102a'],
        pink: ['#1a0a10', '#2a0a15'],
        mint: ['#0a1a14', '#0a2a1e'],
      }
      const [c1, c2] = gradients[color] || gradients.cool
      const grad = ctx.createLinearGradient(0, 0, 0, h)
      grad.addColorStop(0, c1)
      grad.addColorStop(1, c2)
      ctx.fillStyle = grad
      ctx.fillRect(0, 0, w, h)

      // Stars
      ctx.fillStyle = 'rgba(255,255,255,0.3)'
      for (let i = 0; i < 60; i++) {
        const x = Math.random() * w
        const y = Math.random() * h
        const r = Math.random() * 1.5 + 0.5
        ctx.beginPath()
        ctx.arc(x, y, r, 0, Math.PI * 2)
        ctx.fill()
      }

      // Quote text
      const lines = text.split('\\n')
      const fontSize = lines.length <= 3 ? 52 : 44
      ctx.font = `500 ${fontSize}px "Noto Sans TC", sans-serif`
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'

      const colorMap = {
        warm: '#f5e6c8', cool: '#d0c8f0',
        pink: '#f5c8c8', mint: '#c8f0e8'
      }
      ctx.fillStyle = colorMap[color] || '#eee'

      const totalHeight = lines.length * (fontSize + 20)
      const startY = (h / 2) - (totalHeight / 2) + fontSize / 2

      lines.forEach((line, i) => {
        ctx.fillText(line, w / 2, startY + i * (fontSize + 20))
      })

      // Tag
      ctx.font = '400 28px "Noto Sans TC", sans-serif'
      ctx.fillStyle = 'rgba(197,108,240,0.6)'
      ctx.fillText('#' + tag, w / 2, startY + lines.length * (fontSize + 20) + 40)

      // Watermark
      ctx.font = '600 32px "Noto Sans TC", sans-serif'
      ctx.fillStyle = 'rgba(245,200,66,0.25)'
      ctx.fillText('Can We Back?', w / 2, h - 60)

      // Download
      canvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = 'canweback-quote.png'
        a.click()
        URL.revokeObjectURL(url)
      }, 'image/png')

      btn.textContent = '已保存!'
      btn.style.color = '#f5c842'
      setTimeout(() => {
        btn.textContent = '保存這張卡'
        btn.style.color = ''
      }, 2000)
    }

    renderCards()
  </script>
</body>
</html>
