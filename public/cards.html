  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: #05051a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Cosmos background */
    .cosmos {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(88, 40, 180, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(40, 100, 200, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(180, 60, 120, 0.06) 0%, transparent 50%);
    }
    .stars {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0;
    }
    .stars::before, .stars::after {
      content: ''; position: absolute;
      width: 2px; height: 2px; border-radius: 50%; background: white;
      box-shadow:
        25px 50px white, 100px 120px white, 200px 80px white,
        350px 200px white, 50px 300px white, 180px 350px white,
        400px 100px white, 300px 400px white, 150px 180px white,
        450px 320px white, 80px 420px white, 320px 50px white,
        500px 250px white, 250px 500px white, 420px 450px white,
        550px 150px white, 600px 350px white, 700px 200px white,
        130px 520px white, 380px 580px white, 520px 80px white,
        620px 480px white, 750px 300px white, 280px 620px white;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    .stars::after {
      width: 1px; height: 1px;
      box-shadow:
        75px 150px rgba(255,255,255,0.5), 250px 220px rgba(255,255,255,0.5),
        450px 50px rgba(255,255,255,0.5), 120px 400px rgba(255,255,255,0.5),
        500px 380px rgba(255,255,255,0.5), 300px 150px rgba(255,255,255,0.5),
        650px 250px rgba(255,255,255,0.4), 170px 480px rgba(255,255,255,0.4);
      animation: twinkle 3s ease-in-out infinite alternate-reverse;
    }
    @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }

    /* Shooting star */
    @keyframes shootingStar {
      0% { transform: translateX(-100px) translateY(-100px); opacity: 0; }
      5% { opacity: 1; }
      15% { opacity: 1; }
      30% { transform: translateX(400px) translateY(200px); opacity: 0; }
      100% { opacity: 0; }
    }
    .shooting-star {
      position: fixed;
      width: 80px; height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
      pointer-events: none; z-index: 0;
      opacity: 0;
    }
    .shooting-star:nth-child(1) { top: 15%; left: 30%; animation: shootingStar 6s ease-in-out infinite; animation-delay: 2s; }
    .shooting-star:nth-child(2) { top: 40%; left: 60%; animation: shootingStar 8s ease-in-out infinite; animation-delay: 5s; }

    .container {
      max-width: 600px; margin: 0 auto; padding: 40px 20px;
      position: relative; z-index: 1;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 36px; }
    .header-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #c8b6ff, #b8e0ff, #ffd6e0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    .header p {
      color: rgba(200, 200, 230, 0.6);
      font-size: 0.88rem;
      letter-spacing: 1px;
    }

    /* Ritual prompt */
    .ritual {
      text-align: center;
      margin-bottom: 28px;
      padding: 18px 20px;
      background: rgba(200, 182, 255, 0.04);
      border: 1px solid rgba(200, 182, 255, 0.1);
      border-radius: 16px;
    }
    .ritual p {
      font-size: 0.85rem;
      color: rgba(200, 200, 230, 0.7);
      line-height: 1.8;
    }
    .ritual .highlight {
      color: #c8b6ff;
      font-weight: 600;
    }

    .counter {
      text-align: center; margin-bottom: 24px;
      font-size: 0.82rem; color: rgba(200, 200, 230, 0.4);
      letter-spacing: 1px;
    }
    .counter span { color: #c8b6ff; font-weight: 700; }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    /* Flip card */
    .flip-card {
      aspect-ratio: 3/4;
      perspective: 800px;
      cursor: pointer;
    }
    .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
    .flip-card.flipped { cursor: default; }

    .flip-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flip-front, .flip-back {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      padding: 12px;
    }

    /* Front: cosmic card */
    .flip-front {
      background: linear-gradient(135deg, rgba(200, 182, 255, 0.08), rgba(100, 140, 255, 0.06));
      border: 1px solid rgba(200, 182, 255, 0.15);
      flex-direction: column;
      gap: 6px;
    }
    .flip-front .card-symbol {
      font-size: 1.8rem;
      opacity: 0.5;
    }
    .flip-front .card-label {
      font-size: 0.65rem;
      color: rgba(200, 182, 255, 0.4);
      letter-spacing: 2px;
    }
    .flip-card:not(.flipped):hover .flip-front {
      border-color: rgba(200, 182, 255, 0.35);
      box-shadow: 0 0 30px rgba(200, 182, 255, 0.08);
    }
    .flip-card:not(.flipped):active .flip-front {
      transform: scale(0.96);
    }

    /* Back: message */
    .flip-back {
      transform: rotateY(180deg);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(200, 182, 255, 0.12);
      flex-direction: column;
      text-align: center;
      gap: 8px;
    }
    .flip-back .quote {
      font-size: 0.82rem;
      line-height: 1.8;
      color: #eee;
      font-weight: 500;
    }
    .flip-back .card-tag {
      font-size: 0.62rem;
      color: rgba(200, 182, 255, 0.6);
      letter-spacing: 1px;
    }

    /* Color variants */
    .flip-card[data-color="stardust"] .flip-back { border-color: rgba(200, 182, 255, 0.18); background: rgba(200, 182, 255, 0.03); }
    .flip-card[data-color="stardust"] .flip-back .quote { color: #e0d6ff; }
    .flip-card[data-color="moonlight"] .flip-back { border-color: rgba(184, 224, 255, 0.18); background: rgba(184, 224, 255, 0.03); }
    .flip-card[data-color="moonlight"] .flip-back .quote { color: #d6ecff; }
    .flip-card[data-color="aurora"] .flip-back { border-color: rgba(180, 255, 220, 0.18); background: rgba(180, 255, 220, 0.03); }
    .flip-card[data-color="aurora"] .flip-back .quote { color: #d0ffe8; }
    .flip-card[data-color="nebula"] .flip-back { border-color: rgba(255, 180, 220, 0.18); background: rgba(255, 180, 220, 0.03); }
    .flip-card[data-color="nebula"] .flip-back .quote { color: #ffe0ee; }
    .flip-card[data-color="cosmic"] .flip-back { border-color: rgba(255, 220, 180, 0.18); background: rgba(255, 220, 180, 0.03); }
    .flip-card[data-color="cosmic"] .flip-back .quote { color: #fff0dc; }

    /* Reveal animation */
    @keyframes cardReveal {
      0% { opacity: 0; transform: rotateY(180deg) scale(0.8); }
      100% { opacity: 1; transform: rotateY(180deg) scale(1); }
    }
    .flip-card.flipped .flip-back { animation: cardReveal 0.3s ease-out 0.3s both; }

    /* Glow pulse on flip */
    @keyframes glowPulse {
      0% { box-shadow: 0 0 20px rgba(200, 182, 255, 0.2); }
      50% { box-shadow: 0 0 40px rgba(200, 182, 255, 0.3); }
      100% { box-shadow: 0 0 20px rgba(200, 182, 255, 0.1); }
    }
    .flip-card.flipped .flip-back { animation: cardReveal 0.3s ease-out 0.3s both, glowPulse 2s ease-in-out 0.6s; }

    /* Result section */
    .result-section {
      display: none;
      text-align: center;
      animation: fadeUp 0.6s ease-out;
    }
    .result-section.show { display: block; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .result-section .result-text {
      font-size: 1.1rem; color: #fff;
      margin-bottom: 8px; font-weight: 600;
    }
    .result-section .result-sub {
      font-size: 0.85rem; color: rgba(200, 200, 230, 0.6);
      margin-bottom: 24px; line-height: 1.6;
    }

    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }

    .cta-btn {
      display: inline-block; padding: 14px 32px;
      background: linear-gradient(135deg, #c8b6ff, #88b4ff);
      color: #0a0a2e; border-radius: 12px; text-decoration: none;
      font-weight: 700; font-size: 0.95rem; transition: all 0.3s;
      border: none; cursor: pointer;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200, 182, 255, 0.3); }

    .shuffle-btn {
      display: inline-block; padding: 14px 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200, 182, 255, 0.15);
      color: #ccc; border-radius: 12px;
      font-weight: 600; font-size: 0.95rem; transition: all 0.3s;
      cursor: pointer;
    }
    .shuffle-btn:hover { background: rgba(200, 182, 255, 0.08); color: #fff; }

    /* Resonance button */
    .resonance-row {
      display: flex; align-items: center; gap: 6px;
      opacity: 0; transition: opacity 0.4s ease 0.8s;
      pointer-events: none;
      margin-top: 2px;
    }
    .flip-card.flipped .resonance-row {
      opacity: 1; pointer-events: auto;
    }
    .resonate-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.72rem; color: #c8b6ff; padding: 2px 6px;
      border-radius: 12px; transition: all 0.3s;
      display: flex; align-items: center; gap: 3px;
    }
    .resonate-btn:hover { background: rgba(200, 182, 255, 0.1); }
    .resonate-btn.active { color: #c8b6ff; }
    .resonate-btn.active .star-icon { transform: scale(1.3); }
    .star-icon { transition: transform 0.3s; display: inline-block; }
    .resonate-count { font-size: 0.6rem; color: rgba(200, 200, 230, 0.4); }

    /* Save card button */
    .save-card-btn {
      background: none; border: none; cursor: pointer;
      font-size: 0.6rem; color: rgba(200, 200, 230, 0.4); padding: 2px 6px;
      border-radius: 12px; transition: all 0.3s;
      opacity: 0; pointer-events: none;
    }
    .flip-card.flipped .save-card-btn {
      opacity: 0.7; pointer-events: auto;
    }
    .save-card-btn:hover { color: #c8b6ff; opacity: 1; }

    /* Hidden canvas for card export */
    #exportCanvas { display: none; }

    /* Floating CTA */
    .floating-cta {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 14px 20px;
      background: linear-gradient(to top, rgba(5,5,26,0.98) 60%, transparent);
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .floating-cta.show { transform: translateY(0); }
    .floating-cta a {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #c8b6ff, #88b4ff);
      color: #0a0a2e;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(200, 182, 255, 0.2);
    }
    .floating-cta a:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200, 182, 255, 0.3); }

    .footer {
      text-align: center; margin-top: 40px; padding-bottom: 70px;
      color: rgba(200, 200, 230, 0.3); font-size: 0.8rem;
    }
    .footer a { color: rgba(200, 182, 255, 0.5); text-decoration: none; }
    .footer a:hover { color: #c8b6ff; }

    @media (max-width: 380px) {
      .card-grid { gap: 10px; }
      .flip-back .quote { font-size: 0.75rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <script>
    const allMessages = [
      { text: '你現在經歷的\n不是結束\n是宇宙在重新排列', tag: '重生', color: 'stardust' },
      { text: '那個人沒有消失\n只是你們的頻率\n暫時錯開了', tag: '頻率', color: 'moonlight' },

      { text: '你以為是你在想念\n其實是宇宙在提醒你\n那段緣分還沒走完', tag: '緣分', color: 'nebula' },
      { text: '痛苦是因為你愛得深\n而愛得深\n是你最美的能力', tag: '力量', color: 'cosmic' },

      { text: '宇宙不會給你\n承受不了的考驗\n你比自己想的更強大', tag: '堅強', color: 'moonlight' },

      { text: '你深夜的眼淚\n宇宙都收到了\n答案正在路上', tag: '回應', color: 'nebula' },
      { text: '不要急著找答案\n有時候 允許自己迷路\n才能找到真正的方向', tag: '迷路', color: 'cosmic' },
      { text: '你值得被全心全意地愛\n不是因為你完美\n是因為你值得', tag: '價值', color: 'stardust' },
      { text: '每一次心碎\n都是宇宙在你心裡\n打開更大的空間', tag: '空間', color: 'moonlight' },
      { text: '那些沒有說出口的話\n對方的靈魂\n其實都聽見了', tag: '感應', color: 'aurora' },
      { text: '你害怕的不是失去\n你害怕的是\n再也找不到同樣的溫暖', tag: '恐懼', color: 'nebula' },
      { text: '一段關係的結束\n是宇宙在告訴你\n你已經準備好接受更好的', tag: '升級', color: 'cosmic' },
      { text: '思念一個人不丟臉\n那是你的心\n在證明它還活著', tag: '思念', color: 'stardust' },

      { text: '如果一段緣分是真的\n無論繞多遠\n最後都會回來', tag: '歸途', color: 'aurora' },
      { text: '停止追問「為什麼」\n有些事的答案\n要在很久以後才會浮現', tag: '耐心', color: 'nebula' },
      { text: '你以為的最壞結局\n可能是宇宙為你安排的\n最好的開始', tag: '轉折', color: 'cosmic' },
      { text: '真正屬於你的\n不需要拼命抓住\n它會自己留下來', tag: '歸屬', color: 'stardust' },
      { text: '宇宙說\n你今天可以不堅強\n可以好好哭一場', tag: '允許', color: 'moonlight' },
      { text: '所有的遺憾\n都是下一段幸福\n必經的橋', tag: '橋', color: 'aurora' },
      { text: '你送出去的愛\n從來沒有浪費\n宇宙會用另一種方式還給你', tag: '回報', color: 'nebula' },
      { text: '深呼吸\n你現在所在的地方\n就是你該在的地方', tag: '當下', color: 'cosmic' },
      { text: '那個人也許離開了\n但你因為這段愛\n成為了更好的人', tag: '蛻變', color: 'stardust' },
      { text: '宇宙的時間表\n和你的不一樣\n但它從不遲到', tag: '時機', color: 'moonlight' },
    ]

    const cardSymbols = ['&#9734;', '&#9790;', '&#10022;', '&#9672;', '&#10038;', '&#9683;', '&#10048;', '&#9753;', '&#10070;']
    const CARD_COUNT = 9
    const FREE_LIMIT = 1
    let flippedCount = 0
    let unlocked = localStorage.getItem('cards_unlocked') === '1'

    function shuffle(arr) {
      const a = [...arr]
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        ;[a[i], a[j]] = [a[j], a[i]]
      }
      return a
    }

    function renderCards() {
      const grid = document.getElementById('cardGrid')
      const selected = shuffle(allMessages).slice(0, CARD_COUNT)
      const symbols = shuffle(cardSymbols)
      flippedCount = 0
      document.getElementById('flippedCount').textContent = '0'
      document.getElementById('totalCount').textContent = String(CARD_COUNT)
      document.getElementById('resultSection').classList.remove('show')
      grid.innerHTML = ''

      selected.forEach((q, i) => {
        const card = document.createElement('div')
        card.className = 'flip-card'
        card.setAttribute('data-color', q.color)
        const fakeCount = Math.floor(Math.random() * 6000) + 2000
        card.innerHTML = `
          <div class="flip-inner">
            <div class="flip-front">
              <div class="card-symbol">${symbols[i]}</div>
              <div class="card-label">UNIVERSE</div>
            </div>
            <div class="flip-back">
              <div class="quote">${q.text.replace(/\n/g, '<br>')}</div>
              <div class="card-tag">${q.tag}</div>
              <div class="resonance-row">
                <button class="resonate-btn" onclick="event.stopPropagation();resonateCard(this)" data-count="${fakeCount}">
                  <span class="star-icon">&#10024;</span> 說到我心裡了
                </button>
                <span class="resonate-count">${fakeCount.toLocaleString()} 人共鳴</span>
              </div>
              <button class="save-card-btn" onclick="event.stopPropagation();saveCard(this, '${q.text.replace(/'/g, "\\'")}', '${q.tag}', '${q.color}')">保存這張牌</button>
            </div>
          </div>
        `
        card.addEventListener('click', () => flipCard(card))
        card.style.opacity = '0'
        card.style.transform = 'translateY(20px)'
        setTimeout(() => {
          card.style.transition = 'opacity 0.4s ease, transform 0.4s ease'
          card.style.opacity = '1'
          card.style.transform = 'translateY(0)'
        }, i * 80)
        grid.appendChild(card)
      })
    }

    function flipCard(card) {
      if (card.classList.contains('flipped')) return

      // Check paywall: only 1 free flip
      if (!unlocked && flippedCount >= FREE_LIMIT) {
        document.getElementById('cardPaywall').style.display = 'block'
        document.getElementById('cardPaywall').scrollIntoView({ behavior: 'smooth', block: 'center' })
        return
      }

      card.classList.add('flipped')
      flippedCount++

      // Show paywall after first free card
      if (!unlocked && flippedCount >= FREE_LIMIT) {
        setTimeout(() => {
          document.getElementById('cardPaywall').style.display = 'block'
        }, 1200)
      }

      if (flippedCount === 1) {
        setTimeout(() => {
          document.getElementById('floatingCta').classList.add('show')
        }, 1000)
      }

      if (flippedCount === CARD_COUNT) {
        setTimeout(() => {
          document.getElementById('resultSection').classList.add('show')
        }, 800)
      }
    }

    async function unlockAllCards() {
      try {
        const res = await fetch('/api/pay-cards', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
        const data = await res.json()
        if (data.checkoutUrl) {
          localStorage.setItem('cards_pending', '1')
          window.location.href = data.checkoutUrl
          return
        }
        // Dev mode: direct unlock
        doUnlock()
      } catch {
        doUnlock()
      }
    }

    function doUnlock() {
      unlocked = true
      localStorage.setItem('cards_unlocked', '1')
      document.getElementById('cardPaywall').style.display = 'none'
    }

    // Check if returning from payment
    if (new URLSearchParams(window.location.search).get('unlocked') === '1') {
      doUnlock()
      history.replaceState(null, '', '/cards.html')
    }

    function reshuffle() {
      document.getElementById('floatingCta').classList.remove('show')
      renderCards()
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    function resonateCard(btn) {
      if (btn.classList.contains('active')) return
      btn.classList.add('active')
      const count = parseInt(btn.dataset.count) + 1
      btn.dataset.count = count
      const countEl = btn.parentElement.querySelector('.resonate-count')
      countEl.textContent = count.toLocaleString() + ' 人共鳴'
      btn.querySelector('.star-icon').style.transform = 'scale(1.5)'
      setTimeout(() => { btn.querySelector('.star-icon').style.transform = 'scale(1.3)' }, 200)
    }

    function saveCard(btn, text, tag, color) {
      const canvas = document.getElementById('exportCanvas')
      const ctx = canvas.getContext('2d')
      const w = 1080, h = 1350

      const gradients = {
        stardust: ['#0a0520', '#15082e'],
        moonlight: ['#050a1a', '#081228'],
        aurora: ['#050f0a', '#081a12'],
        nebula: ['#100518', '#1a0822'],
        cosmic: ['#100a05', '#1e1008'],
      }
      const [c1, c2] = gradients[color] || gradients.stardust
      const grad = ctx.createLinearGradient(0, 0, 0, h)
      grad.addColorStop(0, c1)
      grad.addColorStop(1, c2)
      ctx.fillStyle = grad
      ctx.fillRect(0, 0, w, h)

      // Stars
      ctx.fillStyle = 'rgba(255,255,255,0.25)'
      for (let i = 0; i < 80; i++) {
        const x = Math.random() * w
        const y = Math.random() * h
        const r = Math.random() * 1.5 + 0.3
        ctx.beginPath()
        ctx.arc(x, y, r, 0, Math.PI * 2)
        ctx.fill()
      }

      // Subtle glow in center
      const glow = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, 400)
      glow.addColorStop(0, 'rgba(200, 182, 255, 0.06)')
      glow.addColorStop(1, 'transparent')
      ctx.fillStyle = glow
      ctx.fillRect(0, 0, w, h)

      // Quote text
      const lines = text.split('\\n')
      const fontSize = lines.length <= 3 ? 52 : 44
      ctx.font = `500 ${fontSize}px "Noto Sans TC", sans-serif`
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'

      const colorMap = {
        stardust: '#e0d6ff', moonlight: '#d6ecff',
        aurora: '#d0ffe8', nebula: '#ffe0ee', cosmic: '#fff0dc'
      }
      ctx.fillStyle = colorMap[color] || '#eee'

      const totalHeight = lines.length * (fontSize + 24)
      const startY = (h / 2) - (totalHeight / 2) + fontSize / 2

      lines.forEach((line, i) => {
        ctx.fillText(line, w / 2, startY + i * (fontSize + 24))
      })

      // Tag
      ctx.font = '400 28px "Noto Sans TC", sans-serif'
      ctx.fillStyle = 'rgba(200, 182, 255, 0.5)'
      ctx.fillText(tag, w / 2, startY + lines.length * (fontSize + 24) + 40)

      // Title
      ctx.font = '600 26px "Noto Sans TC", sans-serif'
      ctx.fillStyle = 'rgba(200, 182, 255, 0.3)'
      ctx.fillText('宇宙的一句話', w / 2, h - 100)

      // Watermark
      ctx.font = '400 22px "Noto Sans TC", sans-serif'
      ctx.fillStyle = 'rgba(200, 200, 230, 0.2)'
      ctx.fillText('canweback.com', w / 2, h - 60)

      // Download
      canvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = 'universe-message.png'
        a.click()
        URL.revokeObjectURL(url)
      }, 'image/png')

      btn.textContent = '已保存 &#10024;'
      btn.style.color = '#c8b6ff'
      setTimeout(() => {
        btn.textContent = '保存這張牌'
        btn.style.color = ''
      }, 2000)
    }

    renderCards()
  </script>
</body>
</html>
