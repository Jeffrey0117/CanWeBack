<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沒說出口的那封信 | Can We Back?</title>
  <meta name="description" content="把你沒說出口的話寫下來。也許對方也寫了一封給你。輸入你的名字，看看有沒有人寫信給你。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="沒說出口的那封信">
  <meta property="og:description" content="把沒說出口的話寫下來，也許對方也正在想你。輸入你的名字查看。">
  <meta property="og:url" content="https://canweback.com/letter.html">
  <meta property="og:image" content="https://canweback.com/og-image.png">
  <meta property="og:locale" content="zh_TW">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: #05051a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .cosmos {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(88, 40, 180, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(40, 100, 200, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(180, 60, 120, 0.06) 0%, transparent 50%);
    }
    .stars {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0;
    }
    .stars::before, .stars::after {
      content: ''; position: absolute;
      width: 2px; height: 2px; border-radius: 50%; background: white;
      box-shadow:
        25px 50px white, 100px 120px white, 200px 80px white,
        350px 200px white, 50px 300px white, 180px 350px white,
        400px 100px white, 300px 400px white, 150px 180px white,
        450px 320px white, 80px 420px white, 320px 50px white,
        500px 250px white, 250px 500px white, 420px 450px white;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    .stars::after {
      width: 1px; height: 1px;
      box-shadow:
        75px 150px rgba(255,255,255,0.5), 250px 220px rgba(255,255,255,0.5),
        450px 50px rgba(255,255,255,0.5), 120px 400px rgba(255,255,255,0.5),
        500px 380px rgba(255,255,255,0.5), 300px 150px rgba(255,255,255,0.5);
      animation: twinkle 3s ease-in-out infinite alternate-reverse;
    }
    @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }

    .container {
      max-width: 520px; margin: 0 auto; padding: 40px 20px;
      position: relative; z-index: 1;
    }

    .header { text-align: center; margin-bottom: 36px; }
    .header-icon {
      font-size: 3rem; margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .header h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #c8b6ff, #ffd6e0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p {
      color: rgba(200, 200, 230, 0.5);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* Tab switcher */
    .tab-bar {
      display: flex;
      background: rgba(200, 182, 255, 0.04);
      border: 1px solid rgba(200, 182, 255, 0.1);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      color: rgba(200, 200, 230, 0.5);
      cursor: pointer;
      transition: all 0.3s;
    }
    .tab.active {
      background: rgba(200, 182, 255, 0.1);
      color: #c8b6ff;
    }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; animation: fadeUp 0.4s ease-out; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: rgba(200, 200, 230, 0.6);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .label-required::after {
      content: ' *';
      color: rgba(255, 120, 120, 0.6);
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      background: rgba(200, 182, 255, 0.04);
      border: 1px solid rgba(200, 182, 255, 0.15);
      border-radius: 12px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
      margin-bottom: 20px;
    }
    input:focus, textarea:focus {
      border-color: rgba(200, 182, 255, 0.4);
    }
    input::placeholder, textarea::placeholder {
      color: rgba(200, 200, 230, 0.3);
    }

    textarea {
      min-height: 200px;
      resize: vertical;
      line-height: 1.8;
    }

    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: rgba(200, 200, 230, 0.3);
      margin-top: -16px;
      margin-bottom: 20px;
    }

    .name-hint {
      font-size: 0.72rem;
      color: rgba(200, 200, 230, 0.35);
      margin-top: -14px;
      margin-bottom: 18px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #c8b6ff, #88b4ff);
      color: #0a0a2e;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200, 182, 255, 0.3); }
    .btn-primary:disabled {
      opacity: 0.4; cursor: not-allowed;
      transform: none; box-shadow: none;
    }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      background: rgba(200, 182, 255, 0.06);
      border: 1px solid rgba(200, 182, 255, 0.15);
      color: #c8b6ff;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 12px;
    }
    .btn-secondary:hover { background: rgba(200, 182, 255, 0.1); }

    /* Sending animation */
    @keyframes envelopeFly {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      30% { transform: translateY(-60px) scale(1.1); opacity: 1; }
      60% { transform: translateY(-150px) scale(0.8) rotate(10deg); opacity: 0.8; }
      100% { transform: translateY(-300px) scale(0.3) rotate(20deg); opacity: 0; }
    }

    .sending-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(5, 5, 26, 0.9);
      z-index: 200;
      align-items: center; justify-content: center;
      flex-direction: column;
    }
    .sending-overlay.active { display: flex; }
    .sending-overlay .envelope-fly {
      font-size: 4rem;
      animation: envelopeFly 2.5s ease-in forwards;
    }
    .sending-overlay .sending-text {
      color: rgba(200, 200, 230, 0.6);
      margin-top: 20px;
      font-size: 0.92rem;
      animation: fadeUp 0.5s ease-out 2s both;
    }

    /* Success */
    .success-box {
      display: none;
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.5s ease-out;
    }
    .success-box.active { display: block; }
    .success-box .icon { font-size: 3rem; margin-bottom: 16px; }
    .success-box h2 { font-size: 1.2rem; color: #c8b6ff; margin-bottom: 12px; }
    .success-box p {
      color: rgba(200, 200, 230, 0.5);
      font-size: 0.85rem; line-height: 1.7;
      margin-bottom: 20px;
    }

    /* Search results */
    .letter-found {
      background: rgba(200, 182, 255, 0.03);
      border: 1px solid rgba(200, 182, 255, 0.12);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      animation: fadeUp 0.4s ease-out;
    }
    .letter-found .from-label {
      font-size: 0.75rem;
      color: rgba(200, 200, 230, 0.4);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .letter-found .from-name {
      font-size: 1.1rem;
      color: #c8b6ff;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .letter-found .date {
      font-size: 0.72rem;
      color: rgba(200, 200, 230, 0.3);
      margin-bottom: 16px;
    }
    .letter-found .locked-preview {
      background: rgba(200, 182, 255, 0.02);
      border: 1px dashed rgba(200, 182, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    .locked-preview .lock-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .locked-preview p {
      font-size: 0.82rem;
      color: rgba(200, 200, 230, 0.4);
      line-height: 1.5;
    }

    .no-letters {
      text-align: center;
      padding: 40px 20px;
      animation: fadeUp 0.4s ease-out;
    }
    .no-letters .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
    .no-letters p {
      color: rgba(200, 200, 230, 0.4);
      font-size: 0.88rem; line-height: 1.6;
    }

    /* Revealed letter */
    .letter-paper {
      background: rgba(200, 182, 255, 0.03);
      border: 1px solid rgba(200, 182, 255, 0.12);
      border-radius: 20px;
      padding: 32px 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease-out;
    }
    .letter-paper::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #c8b6ff, #88b4ff, #ffd6e0);
    }
    .letter-paper .letter-header {
      text-align: center;
      font-size: 0.72rem;
      color: rgba(200, 182, 255, 0.4);
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .letter-paper .greeting {
      font-size: 0.88rem;
      color: rgba(200, 200, 230, 0.6);
      margin-bottom: 16px;
    }
    .letter-paper .greeting span { color: #c8b6ff; }
    .letter-paper .body {
      font-size: 1rem;
      line-height: 2;
      color: #e8e4f0;
      white-space: pre-wrap;
      margin-bottom: 20px;
    }
    .letter-paper .signature {
      text-align: right;
      font-size: 0.88rem;
      color: rgba(200, 200, 230, 0.6);
    }
    .letter-paper .signature span { color: #c8b6ff; }

    .footer {
      text-align: center; margin-top: 50px; padding-bottom: 40px;
      color: rgba(200, 200, 230, 0.3); font-size: 0.8rem;
    }
    .footer a { color: rgba(200, 182, 255, 0.5); text-decoration: none; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cosmos"></div>
  <div class="stars"></div>

  <div class="container">
    <div class="header">
      <div class="header-icon">&#9993;</div>
      <h1>沒說出口的那封信</h1>
      <p>把你沒說出口的話寫下來<br>也許，對方也寫了一封給你</p>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('write')">&#9997; 寫一封信</div>
      <div class="tab" onclick="switchTab('search')">&#128270; 查有沒有我的信</div>
    </div>

    <!-- ── WRITE TAB ── -->
    <div class="section active" id="writeSection">
      <div id="writeForm">
        <label class="label-required">你的本名</label>
        <input type="text" id="senderName" placeholder="請輸入你的真實姓名" maxlength="10">
        <div class="name-hint">必須填本名，對方才能用名字找到這封信</div>

        <label class="label-required">對方的本名</label>
        <input type="text" id="receiverName" placeholder="你想寫信給誰？" maxlength="10">
        <div class="name-hint">請填對方的真實姓名</div>

        <label class="label-required">你想說的話</label>
        <textarea id="letterContent" placeholder="那些沒說出口的話，在這裡寫下來..." maxlength="500"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 500</div>

        <button class="btn-primary" onclick="sendLetter()">&#9993; 把信交出去</button>
      </div>

      <div class="success-box" id="writeSuccess">
        <div class="icon">&#10024;</div>
        <h2>信已經寄出了</h2>
        <p>
          當 <strong id="successReceiver" style="color:#c8b6ff"></strong> 來到這個頁面<br>
          輸入自己的名字，就會看到有一封信<br>
          付費後才能打開你寫的內容
        </p>
        <button class="btn-secondary" onclick="resetWrite()">再寫一封</button>
      </div>
    </div>

    <!-- ── SEARCH TAB ── -->
    <div class="section" id="searchSection">
      <label class="label-required">輸入你的本名</label>
      <input type="text" id="searchName" placeholder="輸入你的真實姓名" maxlength="10">
      <div class="name-hint">看看有沒有人寫了一封信給你</div>

      <button class="btn-primary" onclick="searchLetters()">&#128270; 查詢</button>

      <div id="searchResults" style="margin-top:24px"></div>
    </div>

    <!-- Sending overlay -->
    <div class="sending-overlay" id="sendingOverlay">
      <div class="envelope-fly">&#9993;</div>
      <div class="sending-text">信正在飛向宇宙的另一端...</div>
    </div>

    <div class="footer">
      <a href="/">挽回分析</a> &middot; <a href="/cards.html">宇宙的一句話</a> &middot; <a href="/fortune.html">觀音靈籤</a>
      <p style="margin-top:12px">Can We Back? &copy; 2026</p>
    </div>
  </div>

  <script>
    document.getElementById('letterContent').addEventListener('input', function() {
      document.getElementById('charCount').textContent = this.value.length
    })

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'write' && i === 0) || (tab === 'search' && i === 1))
      })
      document.getElementById('writeSection').classList.toggle('active', tab === 'write')
      document.getElementById('searchSection').classList.toggle('active', tab === 'search')
    }

    async function sendLetter() {
      const senderName = document.getElementById('senderName').value.trim()
      const receiverName = document.getElementById('receiverName').value.trim()
      const content = document.getElementById('letterContent').value.trim()

      let valid = true
      if (!senderName) { document.getElementById('senderName').style.borderColor = 'rgba(255,100,100,0.5)'; valid = false }
      else { document.getElementById('senderName').style.borderColor = '' }
      if (!receiverName) { document.getElementById('receiverName').style.borderColor = 'rgba(255,100,100,0.5)'; valid = false }
      else { document.getElementById('receiverName').style.borderColor = '' }
      if (!content) { document.getElementById('letterContent').style.borderColor = 'rgba(255,100,100,0.5)'; valid = false }
      else { document.getElementById('letterContent').style.borderColor = '' }
      if (!valid) return

      // Show sending animation
      document.getElementById('sendingOverlay').classList.add('active')

      try {
        const res = await fetch('/api/letter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ senderName, receiverName, content }),
        })
        const data = await res.json()

        setTimeout(() => {
          document.getElementById('sendingOverlay').classList.remove('active')
          if (data.letterId) {
            document.getElementById('writeForm').style.display = 'none'
            document.getElementById('successReceiver').textContent = receiverName
            document.getElementById('writeSuccess').classList.add('active')
          } else {
            alert(data.error || '寄信失敗')
          }
        }, 3000)
      } catch {
        document.getElementById('sendingOverlay').classList.remove('active')
        alert('網路錯誤，請重試')
      }
    }

    function resetWrite() {
      document.getElementById('writeForm').style.display = 'block'
      document.getElementById('writeSuccess').classList.remove('active')
      document.getElementById('senderName').value = ''
      document.getElementById('receiverName').value = ''
      document.getElementById('letterContent').value = ''
      document.getElementById('charCount').textContent = '0'
    }

    async function searchLetters() {
      const name = document.getElementById('searchName').value.trim()
      if (!name) {
        document.getElementById('searchName').style.borderColor = 'rgba(255,100,100,0.5)'
        return
      }
      document.getElementById('searchName').style.borderColor = ''

      const resultsDiv = document.getElementById('searchResults')
      resultsDiv.innerHTML = '<p style="text-align:center;color:rgba(200,200,230,0.4);font-size:0.85rem">搜尋中...</p>'

      try {
        const res = await fetch('/api/letter/search?name=' + encodeURIComponent(name))
        const data = await res.json()

        if (!data.letters || data.letters.length === 0) {
          resultsDiv.innerHTML = `
            <div class="no-letters">
              <div class="icon">&#9993;</div>
              <p>目前還沒有人寫信給「${escapeHtml(name)}」<br><br>也許你可以先寫一封給想說的人？</p>
            </div>
          `
          return
        }

        resultsDiv.innerHTML = `
          <p style="text-align:center;color:rgba(200,200,230,0.5);font-size:0.85rem;margin-bottom:16px">
            找到 <span style="color:#c8b6ff;font-weight:700">${data.letters.length}</span> 封信給你
          </p>
        `

        data.letters.forEach(letter => {
          const div = document.createElement('div')
          div.className = 'letter-found'

          if (letter.unlocked) {
            div.innerHTML = `
              <div class="from-label">來自</div>
              <div class="from-name">${escapeHtml(letter.senderName)}</div>
              <div class="date">${formatDate(letter.createdAt)}</div>
              <div class="letter-paper" style="margin:0">
                <div class="letter-header">&#10024; ${escapeHtml(letter.senderName)} 寫給你的信 &#10024;</div>
                <div class="greeting">親愛的 <span>${escapeHtml(name)}</span>，</div>
                <div class="body">${escapeHtml(letter.content)}</div>
                <div class="signature">— <span>${escapeHtml(letter.senderName)}</span></div>
              </div>
            `
          } else {
            div.innerHTML = `
              <div class="from-label">來自</div>
              <div class="from-name">${escapeHtml(letter.senderName)}</div>
              <div class="date">${formatDate(letter.createdAt)}</div>
              <div class="locked-preview">
                <div class="lock-icon">&#128274;</div>
                <p>${escapeHtml(letter.senderName)} 寫了一封信給你<br>付費解鎖才能看到內容</p>
              </div>
              <button class="btn-primary" onclick="unlockLetter('${letter.id}')">&#128275; 解鎖這封信（NT$99）</button>
            `
          }

          resultsDiv.appendChild(div)
        })
      } catch {
        resultsDiv.innerHTML = '<p style="text-align:center;color:rgba(255,100,100,0.5)">查詢失敗，請重試</p>'
      }
    }

    async function unlockLetter(letterId) {
      try {
        const res = await fetch('/api/letter/' + letterId + '/pay', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        })
        const data = await res.json()

        if (data.checkoutUrl) {
          // Save search name so we can auto-search after payment
          localStorage.setItem('letter_search_name', document.getElementById('searchName').value.trim())
          window.location.href = data.checkoutUrl
        } else if (data.success) {
          // Dev mode: direct unlock, re-search
          searchLetters()
        }
      } catch {
        alert('網路錯誤，請重試')
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div')
      d.textContent = str
      return d.innerHTML
    }

    function formatDate(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate()
    }

    // Auto-search if returning from payment
    const urlParams = new URLSearchParams(window.location.search)
    if (urlParams.get('paid') === '1') {
      const savedName = localStorage.getItem('letter_search_name')
      if (savedName) {
        switchTab('search')
        document.getElementById('searchName').value = savedName
        localStorage.removeItem('letter_search_name')
        searchLetters()
      }
      history.replaceState(null, '', '/letter.html')
    }
  </script>
</body>
</html>
