  <script>
    let currentOrderId = null
    let currentFortune = null
    let countdownInterval = null

    function getColor(score) {
      if (score >= 80) return '#00b894'
      if (score >= 60) return '#f5c842'
      if (score >= 40) return '#e17055'
      return '#d63031'
    }

    async function getFortune() {
      const myBirthday = document.getElementById('myBirthday').value.trim()
      const partnerBirthday = document.getElementById('partnerBirthday').value.trim()
      const myName = document.getElementById('myName').value.trim()
      const partnerName = document.getElementById('partnerName').value.trim()

      if (!myName || !partnerName) return alert('請輸入雙方的名字')
      if (!myBirthday || !partnerBirthday) return alert('請輸入雙方的生日')

      const cleaned1 = myBirthday.replace(/\D/g, '')
      const cleaned2 = partnerBirthday.replace(/\D/g, '')
      if (cleaned1.length < 6 || cleaned1.length > 7) return alert('你的生日格式不正確，請輸入如 880118')
      if (cleaned2.length < 6 || cleaned2.length > 7) return alert('對方生日格式不正確，請輸入如 900520')

      const btn = document.getElementById('submitBtn')
      btn.disabled = true
      document.getElementById('inputCard').style.display = 'none'
      document.getElementById('loadingSection').style.display = 'block'

      try {
        const res = await fetch('/api/fortune', {

    function animateScore(el, target, duration) {
      const start = performance.now()
      const update = (now) => {
        const elapsed = now - start
        const progress = Math.min(elapsed / duration, 1)
        // Ease out cubic
        const eased = 1 - Math.pow(1 - progress, 3)
        const current = Math.round(eased * target)
        el.textContent = current
        el.style.color = getColor(current)
        if (progress < 1) requestAnimationFrame(update)
      }
      requestAnimationFrame(update)
    }

    function startCountdown() {
      const timerEl = document.getElementById('countdownTimer')
      if (!timerEl) return
      let remaining = 15 * 60 // 15 minutes
      if (countdownInterval) clearInterval(countdownInterval)
      countdownInterval = setInterval(() => {
        remaining--
        if (remaining <= 0) {
          clearInterval(countdownInterval)
          timerEl.textContent = '已過期'
          return
        }
        const m = Math.floor(remaining / 60)
        const s = remaining % 60
        timerEl.textContent = `${m}:${String(s).padStart(2, '0')}`
      }, 1000)
    }

    function generateShareCard(myName, partnerName, score, destiny, myCon, partnerCon) {
      const canvas = document.getElementById('shareCanvas')
      const ctx = canvas.getContext('2d')
      const w = 1080, h = 1080

      // Background
      const grad = ctx.createLinearGradient(0, 0, 0, h)
      grad.addColorStop(0, '#0a0a1a')
      grad.addColorStop(0.5, '#12102a')
      grad.addColorStop(1, '#0a0a1a')
      ctx.fillStyle = grad
      ctx.fillRect(0, 0, w, h)

      // Stars
      ctx.fillStyle = 'rgba(255,255,255,0.25)'
      for (let i = 0; i < 50; i++) {
        const x = Math.random() * w, y = Math.random() * h
        ctx.beginPath()
        ctx.arc(x, y, Math.random() * 1.5 + 0.5, 0, Math.PI * 2)
        ctx.fill()
      }

      // Title
      ctx.font = '700 56px "Noto Sans TC", sans-serif'
      ctx.textAlign = 'center'
      ctx.fillStyle = '#f5c842'
      ctx.fillText('Can We Back?', w / 2, 160)

      // Names
      ctx.font = '600 42px "Noto Sans TC", sans-serif'
      ctx.fillStyle = '#ffffff'
      ctx.fillText(myName + '  \u2661  ' + partnerName, w / 2, 260)

      // Constellation
      ctx.font = '400 28px "Noto Sans TC", sans-serif'
      ctx.fillStyle = '#999999'
      ctx.fillText(myCon + ' \u00d7 ' + partnerCon, w / 2, 310)

      // Big score circle
      const cx = w / 2, cy = 520, radius = 140
      // Outer ring
      ctx.beginPath()
      ctx.arc(cx, cy, radius, 0, Math.PI * 2)
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'
      ctx.lineWidth = 8
      ctx.stroke()
      // Score arc
      const angle = (score / 100) * Math.PI * 2 - Math.PI / 2
      ctx.beginPath()
      ctx.arc(cx, cy, radius, -Math.PI / 2, angle)
      ctx.strokeStyle = getColor(score)
      ctx.lineWidth = 8
      ctx.lineCap = 'round'
      ctx.stroke()
      // Score text
      ctx.font = '800 80px "Noto Sans TC", sans-serif'
      ctx.fillStyle = getColor(score)
      ctx.fillText(score, cx, cy + 10)
      ctx.font = '400 24px "Noto Sans TC", sans-serif'
      ctx.fillStyle = '#888'
      ctx.fillText('/ 100', cx, cy + 50)

      // Label
      ctx.font = '400 28px "Noto Sans TC", sans-serif'
      ctx.fillStyle = '#aaa'
      ctx.fillText('\u633d\u56de\u6307\u6578', cx, cy - radius - 30)

      // Destiny
      ctx.font = '700 38px "Noto Sans TC", sans-serif'
      ctx.fillStyle = '#f5c842'
      ctx.fillText('\u7de3\u5206\u5224\u5b9a\uff1a' + destiny, cx, 740)

      // CTA — prominent with background pill
      const ctaY = 840
      ctx.fillStyle = 'rgba(245,200,66,0.12)'
      const ctaText = '\u4f60\u4e5f\u4f86\u6e2c\u6e2c \u2192 canweback.com'
      ctx.font = '600 30px "Noto Sans TC", sans-serif'
      const ctaW = ctx.measureText(ctaText).width
      ctx.beginPath()
      ctx.roundRect(cx - ctaW / 2 - 24, ctaY - 22, ctaW + 48, 50, 25)
      ctx.fill()
      ctx.fillStyle = '#f5c842'
      ctx.fillText(ctaText, cx, ctaY + 4)

      // Watermark
      ctx.font = '400 20px "Noto Sans TC", sans-serif'
      ctx.fillStyle = 'rgba(255,255,255,0.2)'
      ctx.fillText('canweback.com \u00a9 2026', cx, h - 35)

      // Download
      canvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = 'canweback-score.png'
        a.click()
        URL.revokeObjectURL(url)
      }, 'image/png')
    }

    async function buyPlan() {
      if (!currentOrderId) return

      const btn = event.target
      btn.textContent = '處理中...'
      btn.disabled = true

      // Save fortune data to localStorage so checkout-success can restore it
      localStorage.setItem('canweback_orderId', currentOrderId)
      localStorage.setItem('canweback_fortune', JSON.stringify(currentFortune))

      try {
        const res = await fetch('/api/buy-plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: currentOrderId }),
        })
        const data = await res.json()

        if (data.success && data.checkoutUrl) {
          window.location.href = data.checkoutUrl
        } else {
          alert(data.error || '購買失敗，請重試')
          btn.textContent = '取得我的專屬改造計畫'
          btn.disabled = false
        }
      } catch (err) {
        alert('購買失敗，請重試')
        btn.textContent = '取得我的專屬改造計畫'
        btn.disabled = false
      }
    }
  </script>
</body>
</html>
