<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Can We Back? | 挽回指數分析</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .stars::before, .stars::after {
      content: '';
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: white;
      box-shadow:
        25px 50px white, 100px 120px white, 200px 80px white,
        350px 200px white, 50px 300px white, 180px 350px white,
        400px 100px white, 300px 400px white, 150px 180px white,
        450px 320px white, 80px 420px white, 320px 50px white,
        500px 250px white, 250px 500px white, 420px 450px white,
        550px 150px white, 600px 350px white, 700px 200px white,
        650px 400px white, 750px 100px white, 350px 550px white;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    .stars::after {
      width: 1px; height: 1px;
      box-shadow:
        75px 150px rgba(255,255,255,0.6), 250px 220px rgba(255,255,255,0.6),
        450px 50px rgba(255,255,255,0.6), 120px 400px rgba(255,255,255,0.6),
        500px 380px rgba(255,255,255,0.6), 300px 150px rgba(255,255,255,0.6),
        680px 280px rgba(255,255,255,0.5), 550px 450px rgba(255,255,255,0.5);
      animation: twinkle 3s ease-in-out infinite alternate-reverse;
    }

    @keyframes twinkle {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    h1 {
      text-align: center;
      font-size: 2.2rem;
      background: linear-gradient(135deg, #f5c842, #ff6b6b, #c56cf0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(10px);
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    .input-row { display: flex; gap: 12px; }
    .input-row .form-group { flex: 1; }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1.1rem;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #f5c842;
      box-shadow: 0 0 0 3px rgba(245,200,66,0.15);
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.25); }

    .section-label {
      font-size: 0.8rem;
      color: #c56cf0;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(197,108,240,0.2);
    }

    .hint { font-size: 0.75rem; color: #666; margin-top: 4px; }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #f5c842, #ff6b6b);
      color: #1a1a2e;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,200,66,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-pay {
      background: linear-gradient(135deg, #00b894, #00cec9);
      color: white;
    }
    .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,184,148,0.3); }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-premium {
      background: linear-gradient(135deg, #c56cf0, #6c5ce7);
      color: white;
    }
    .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(197,108,240,0.3); }
    .btn-premium:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .preview-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .preview-header h2 {
      font-size: 1.4rem;
      color: #f5c842;
      margin-bottom: 4px;
    }
    .preview-header p { color: #888; font-size: 0.85rem; }

    .vs-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .vs-person { text-align: center; flex: 1; }
    .vs-person .name { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .vs-person .details { font-size: 0.8rem; color: #999; line-height: 1.5; }
    .vs-icon { font-size: 1.4rem; color: #ff6b6b; flex-shrink: 0; }

    .luck-meter { margin-bottom: 16px; }
    .luck-meter .luck-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    .luck-bar {
      height: 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .luck-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease;
    }

    .traits-list { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .trait {
      background: rgba(197,108,240,0.15);
      border: 1px solid rgba(197,108,240,0.25);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #c56cf0;
    }

    /* Blur paywall */
    .blur-section { position: relative; margin-top: 24px; }
    .blur-content {
      filter: blur(6px);
      pointer-events: none;
      user-select: none;
    }
    .blur-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,26,0.6);
      border-radius: 12px;
      z-index: 2;
    }
    .blur-overlay .lock-icon { font-size: 2rem; margin-bottom: 12px; }
    .blur-overlay p { color: #ccc; margin-bottom: 16px; text-align: center; line-height: 1.5; }
    .price-tag { font-size: 1.8rem; font-weight: 800; color: #00b894; margin-bottom: 8px; }
    .price-original { text-decoration: line-through; color: #666; font-size: 0.9rem; }

    /* Report sections */
    .report-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .report-section h3 {
      font-size: 1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .report-section p { color: #bbb; line-height: 1.7; font-size: 0.95rem; }
    .report-section .action-plan {
      white-space: pre-line;
      color: #bbb;
      line-height: 1.8;
      font-size: 0.9rem;
    }

    .lucky-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
    }
    .lucky-item { text-align: center; padding: 12px; background: rgba(245,200,66,0.05); border-radius: 8px; }
    .lucky-item .li-label { font-size: 0.75rem; color: #888; }
    .lucky-item .li-value { font-size: 1rem; color: #f5c842; font-weight: 600; margin-top: 4px; }

    /* Upsell card */
    .upsell-card {
      background: linear-gradient(135deg, rgba(197,108,240,0.1), rgba(108,92,231,0.1));
      border: 1px solid rgba(197,108,240,0.3);
      border-radius: 16px;
      padding: 32px;
      margin-top: 24px;
      text-align: center;
    }
    .upsell-card h3 {
      font-size: 1.3rem;
      color: #c56cf0;
      margin-bottom: 12px;
    }
    .upsell-card .upsell-desc {
      color: #aaa;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .upsell-features {
      text-align: left;
      margin-bottom: 24px;
    }
    .upsell-features .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.9rem;
      color: #ccc;
    }
    .upsell-features .feature-item:last-child { border-bottom: none; }
    .feature-check { color: #c56cf0; flex-shrink: 0; font-weight: 700; }
    .upsell-pricing { margin-bottom: 20px; }

    .loading { text-align: center; padding: 40px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #f5c842;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { text-align: center; margin-top: 48px; color: #555; font-size: 0.8rem; }

    .back-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #aaa;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .success-badge {
      display: inline-block;
      background: rgba(0,184,148,0.15);
      border: 1px solid rgba(0,184,148,0.3);
      color: #00b894;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    @media (max-width: 480px) {
      .container { padding: 24px 16px; }
      h1 { font-size: 1.8rem; }
      .card { padding: 24px 18px; }
      .upsell-card { padding: 24px 18px; }
      .input-row { flex-direction: column; gap: 0; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="stars"></div>
  <div class="container">
    <h1>Can We Back?</h1>
    <p class="subtitle">輸入雙方資料，分析你們的挽回指數</p>

    <div class="card" id="inputCard">
      <div class="section-label">你的資料</div>
      <div class="input-row">
        <div class="form-group">
          <label for="myName">你的名字 *</label>
          <input type="text" id="myName" placeholder="請輸入姓名">
        </div>
        <div class="form-group">
          <label for="myBirthday">你的生日</label>
          <input type="text" id="myBirthday" placeholder="如 880118" inputmode="numeric" maxlength="7">
          <div class="hint">民國年月日，如 880118</div>
        </div>
      </div>

      <div class="section-label" style="margin-top:8px">對方的資料</div>
      <div class="input-row">
        <div class="form-group">
          <label for="partnerName">對方名字 *</label>
          <input type="text" id="partnerName" placeholder="請輸入對方姓名">
        </div>
        <div class="form-group">
          <label for="partnerBirthday">對方生日</label>
          <input type="text" id="partnerBirthday" placeholder="如 900520" inputmode="numeric" maxlength="7">
          <div class="hint">民國年月日，如 900520</div>
        </div>
      </div>

      <button class="btn btn-primary" id="submitBtn" onclick="getFortune()" style="margin-top:8px">分析挽回指數</button>
    </div>

    <div id="loadingSection" style="display:none">
      <div class="card">
        <div class="loading">
          <div class="spinner"></div>
          <p style="color:#f5c842">命盤合對分析中...</p>
          <p style="color:#888;font-size:0.85rem;margin-top:8px">正在解讀你們的緣分密碼</p>
        </div>
      </div>
    </div>

    <div id="previewSection" style="display:none"></div>
    <div id="fullReport" style="display:none"></div>

    <div style="text-align:center;margin-top:40px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="/cards.html" style="color:#f5c842;text-decoration:none;font-size:0.9rem;padding:12px 24px;border:1px solid rgba(245,200,66,0.3);border-radius:30px;display:inline-block;transition:all 0.3s" onmouseover="this.style.background='rgba(245,200,66,0.1)'" onmouseout="this.style.background='transparent'">
        失戀語錄牌 &rarr;
      </a>
      <a href="/blog.html" style="color:#c56cf0;text-decoration:none;font-size:0.9rem;padding:12px 24px;border:1px solid rgba(197,108,240,0.3);border-radius:30px;display:inline-block;transition:all 0.3s" onmouseover="this.style.background='rgba(197,108,240,0.1)'" onmouseout="this.style.background='transparent'">
        失戀急診室 &rarr;
      </a>
    </div>

    <div class="footer">
      <p>Can We Back? &copy; 2026</p>
    </div>
  </div>

  <script>
    let currentOrderId = null
    let currentFortune = null

    function getColor(score) {
      if (score >= 80) return '#00b894'
      if (score >= 60) return '#f5c842'
      if (score >= 40) return '#e17055'
      return '#d63031'
    }

    async function getFortune() {
      const myBirthday = document.getElementById('myBirthday').value.trim()
      const partnerBirthday = document.getElementById('partnerBirthday').value.trim()
      const myName = document.getElementById('myName').value.trim()
      const partnerName = document.getElementById('partnerName').value.trim()

      if (!myName || !partnerName) return alert('請輸入雙方的名字')
      if (!myBirthday || !partnerBirthday) return alert('請輸入雙方的生日')

      const cleaned1 = myBirthday.replace(/\D/g, '')
      const cleaned2 = partnerBirthday.replace(/\D/g, '')
      if (cleaned1.length < 6 || cleaned1.length > 7) return alert('你的生日格式不正確，請輸入如 880118')
      if (cleaned2.length < 6 || cleaned2.length > 7) return alert('對方生日格式不正確，請輸入如 900520')

      const btn = document.getElementById('submitBtn')
      btn.disabled = true
      document.getElementById('inputCard').style.display = 'none'
      document.getElementById('loadingSection').style.display = 'block'

      try {
        const res = await fetch('/api/fortune', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myBirthday, partnerBirthday, myName, partnerName }),
        })
        const data = await res.json()

        if (data.error) {
          alert(data.error)
          btn.disabled = false
          document.getElementById('inputCard').style.display = 'block'
          document.getElementById('loadingSection').style.display = 'none'
          return
        }

        currentOrderId = data.orderId
        currentFortune = data.fortune

        await new Promise(r => setTimeout(r, 2000))

        document.getElementById('loadingSection').style.display = 'none'
        renderPreview(data.preview, data.fortune)
      } catch (err) {
        alert('分析失敗，請重試')
        btn.disabled = false
        document.getElementById('inputCard').style.display = 'block'
        document.getElementById('loadingSection').style.display = 'none'
      }
    }

    function renderPreview(p, f) {
      const el = document.getElementById('previewSection')

      el.innerHTML = `
        <div class="card">
          <div class="preview-header">
            <h2>挽回指數分析預覽</h2>
            <p>${f.myName} & ${f.partnerName} 的緣分解析</p>
          </div>

          <div class="vs-row">
            <div class="vs-person">
              <div class="name">${f.myName}</div>
              <div class="details">
                ${p.myConstellation} / ${p.myZodiac}<br>
                五行屬${p.myElement}
              </div>
            </div>
            <div class="vs-icon">&hearts;</div>
            <div class="vs-person">
              <div class="name">${f.partnerName}</div>
              <div class="details">
                ${p.partnerConstellation} / ${p.partnerZodiac}<br>
                五行屬${p.partnerElement}
              </div>
            </div>
          </div>

          <div style="margin-bottom:20px">
            <p style="color:#aaa;font-size:0.85rem;margin-bottom:8px">${f.myName} 的性格特質</p>
            <div class="traits-list">
              ${p.myTraits.map(t => '<span class="trait">' + t + '</span>').join('')}
            </div>
          </div>

          <div class="luck-meter">
            <div class="luck-label"><span>挽回指數</span><span style="color:${getColor(p.reconciliation)}">${p.reconciliation}/100</span></div>
            <div class="luck-bar"><div class="luck-fill" style="width:${p.reconciliation}%;background:${getColor(p.reconciliation)}"></div></div>
          </div>

          <div style="text-align:center;margin:20px 0;padding:16px;background:rgba(245,200,66,0.08);border-radius:12px;border:1px solid rgba(245,200,66,0.2)">
            <div style="font-size:0.8rem;color:#999;margin-bottom:4px">緣分判定</div>
            <div style="font-size:1.4rem;font-weight:800;color:#f5c842">${f.destinyLevel}</div>
          </div>

          <div class="blur-section">
            <div class="blur-content">
              <div class="report-section">
                <h3>&#x1F52E; 挽回分析</h3>
                <p>根據你們的五行與星座配對分析，這段關係存在修復的可能性。你們之間的能量場顯示...</p>
              </div>
              <div class="report-section">
                <h3>&#x1F4AC; 溝通建議</h3>
                <p>你們的溝通方式需要調整，根據命盤顯示最有效的溝通策略是...</p>
              </div>
              <div class="report-section">
                <h3>&#x23F0; 最佳時機</h3>
                <p>星象分析顯示最有利的復合時間點即將到來...</p>
              </div>
              <div class="report-section">
                <h3>&#x1F4CB; 行動方案</h3>
                <p>四階段挽回計畫：冷靜期、輕度接觸、自然互動、深度溝通...</p>
              </div>
            </div>
            <div class="blur-overlay">
              <div class="lock-icon">&#x1F512;</div>
              <p>解鎖完整挽回分析報告<br>包含溝通策略、最佳時機、行動方案</p>
              <div class="price-original">原價 NT$599</div>
              <div class="price-tag">NT$299</div>
              <button class="btn btn-pay" style="width:auto;padding:14px 40px" onclick="unlockReport()">
                立即解鎖完整報告
              </button>
            </div>
          </div>
        </div>
      `

      el.style.display = 'block'
    }

    async function unlockReport() {
      if (!currentOrderId) return

      const btn = event.target
      btn.textContent = '處理中...'
      btn.disabled = true

      try {
        const res = await fetch('/api/pay', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: currentOrderId, product: 'report' }),
        })
        const data = await res.json()

        if (data.success) {
          document.getElementById('previewSection').style.display = 'none'
          renderFullReport(currentFortune)
        }
      } catch (err) {
        alert('付款失敗，請重試')
        btn.textContent = '立即解鎖完整報告'
        btn.disabled = false
      }
    }

    function renderFullReport(f) {
      const luckEntries = [
        ['挽回指數', f.luckScores.reconciliation],
        ['化學反應', f.luckScores.chemistry],
        ['溝通契合', f.luckScores.communication],
        ['時機指數', f.luckScores.timing],
        ['長期穩定', f.luckScores.longTerm],
      ]

      const luckBars = luckEntries.map(([label, score]) => `
        <div class="luck-meter">
          <div class="luck-label"><span>${label}</span><span style="color:${getColor(score)}">${score}/100</span></div>
          <div class="luck-bar"><div class="luck-fill" style="width:${score}%;background:${getColor(score)}"></div></div>
        </div>
      `).join('')

      const el = document.getElementById('fullReport')

      el.innerHTML = `
        <div class="card">
          <div class="preview-header">
            <span class="success-badge">&#x2713; 報告已解鎖</span>
            <h2>挽回指數分析報告</h2>
            <p>${f.myName} & ${f.partnerName} 的完整緣分解析</p>
          </div>

          <div class="vs-row">
            <div class="vs-person">
              <div class="name">${f.myName}</div>
              <div class="details">
                ${f.myConstellation} / ${f.myZodiac}<br>
                五行屬${f.myElement}
              </div>
            </div>
            <div class="vs-icon">&hearts;</div>
            <div class="vs-person">
              <div class="name">${f.partnerName}</div>
              <div class="details">
                ${f.partnerConstellation} / ${f.partnerZodiac}<br>
                五行屬${f.partnerElement}
              </div>
            </div>
          </div>

          <div style="margin-bottom:20px">
            <p style="color:#aaa;font-size:0.85rem;margin-bottom:8px">${f.myName} 的性格特質</p>
            <div class="traits-list">
              ${f.myTraits.map(t => '<span class="trait">' + t + '</span>').join('')}
            </div>
          </div>

          ${luckBars}

          <div class="report-section">
            <h3>&#x1F9E0; ${f.partnerName} 的內心世界</h3>
            <p>${f.partnerPsychology}</p>
          </div>

          <div class="report-section">
            <h3>&#x1F52E; 挽回分析</h3>
            <p>${f.reconciliationAdvice}</p>
          </div>

          <div class="report-section">
            <h3>&#x1F4AC; 溝通建議</h3>
            <p>${f.communicationAdvice}</p>
          </div>

          <div class="report-section">
            <h3>&#x23F0; 時機判斷</h3>
            <p>${f.timingAdvice}</p>
          </div>

          <div class="report-section">
            <h3>&#x1F4CB; 行動方案</h3>
            <div class="action-plan">${f.actionPlan}</div>
          </div>

          <div class="report-section">
            <h3>&#x1F340; 挽回幸運指南</h3>
            <div class="lucky-grid">
              <div class="lucky-item">
                <div class="li-label">幸運色</div>

              </div>
              <div class="lucky-item">
                <div class="li-label">幸運數字</div>
                <div class="li-value">${f.luckyItems.number}</div>
              </div>
              <div class="lucky-item">
                <div class="li-label">幸運方位</div>
                <div class="li-value">${f.luckyItems.direction}</div>
              </div>
              <div class="lucky-item">
                <div class="li-label">幸運花</div>
                <div class="li-value">${f.luckyItems.flower}</div>
              </div>
              <div class="lucky-item">
                <div class="li-label">幸運日</div>
                <div class="li-value">${f.luckyItems.day}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="upsell-card">
          <h3>&#x1F48E; 挽回改造計畫</h3>
          <p class="upsell-desc">
            報告只是起點。真正讓對方回頭的，是你的蛻變。<br>
            根據 ${f.myName} 與 ${f.partnerName} 的命盤量身打造的完整改造方案。
          </p>

          <div class="upsell-features">
            <div class="feature-item">
              <span class="feature-check">&#x2713;</span>
              <span>21天挽回行動日曆 — 每天一個具體任務，循序漸進重建連結</span>
            </div>
            <div class="feature-item">
              <span class="feature-check">&#x2713;</span>
              <span>對方星座心理解析 — 深入了解 ${f.partnerConstellation} 的核心需求與地雷</span>
            </div>
            <div class="feature-item">
              <span class="feature-check">&#x2713;</span>
              <span>溝通話術範本 — 不同情境下的最佳回覆策略</span>
            </div>
            <div class="feature-item">
              <span class="feature-check">&#x2713;</span>
              <span>自我提升指南 — 根據你的五行屬性打造個人魅力方案</span>

            取得我的專屬改造計畫
          </button>

      `

      el.style.display = 'block'
    }

    async function buyPlan() {
      if (!currentOrderId) return

      const btn = event.target
      btn.textContent = '處理中...'
      btn.disabled = true

      try {
        const res = await fetch('/api/buy-plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: currentOrderId }),
        })
        const data = await res.json()

        if (data.success) {
          window.location.href = '/plan.html?id=' + currentOrderId
        }
      } catch (err) {
        alert('購買失敗，請重試')
        btn.textContent = '取得我的專屬改造計畫'
        btn.disabled = false
      }
    }
