<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你有一封宇宙來信 | Can We Back?</title>
  <meta name="description" content="有人透過宇宙寫了一封信給你。回信或解鎖才能打開。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="你有一封宇宙來信 &#10024;">
  <meta property="og:description" content="有人透過宇宙寫了一封信給你，回信才能解鎖。">
  <meta property="og:url" content="https://canweback.com/letter-read.html">
  <meta property="og:image" content="https://canweback.com/og-image.png">
  <meta property="og:locale" content="zh_TW">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: #05051a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .cosmos {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(88, 40, 180, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(40, 100, 200, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(180, 60, 120, 0.06) 0%, transparent 50%);
    }
    .stars {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0;
    }
    .stars::before, .stars::after {
      content: ''; position: absolute;
      width: 2px; height: 2px; border-radius: 50%; background: white;
      box-shadow:
        25px 50px white, 100px 120px white, 200px 80px white,
        350px 200px white, 50px 300px white, 180px 350px white,
        400px 100px white, 300px 400px white, 150px 180px white,
        450px 320px white, 80px 420px white, 320px 50px white;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    .stars::after {
      width: 1px; height: 1px;
      box-shadow:
        75px 150px rgba(255,255,255,0.5), 250px 220px rgba(255,255,255,0.5),
        450px 50px rgba(255,255,255,0.5), 120px 400px rgba(255,255,255,0.5);
      animation: twinkle 3s ease-in-out infinite alternate-reverse;
    }
    @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }

    .container {
      max-width: 520px; margin: 0 auto; padding: 40px 20px;
      position: relative; z-index: 1;
    }

    /* Envelope scene */
    .envelope-scene {
      text-align: center;
      padding: 40px 0;
    }

    @keyframes envelopeFloat {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-12px) rotate(2deg); }
    }
    .envelope-big {
      font-size: 5rem;
      display: inline-block;
      animation: envelopeFloat 3s ease-in-out infinite;
      cursor: default;
      filter: drop-shadow(0 10px 30px rgba(200, 182, 255, 0.2));
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(200, 182, 255, 0.1); }
      50% { box-shadow: 0 0 40px rgba(200, 182, 255, 0.25); }
    }

    .envelope-info {
      margin-top: 24px;
    }
    .envelope-info h1 {
      font-size: 1.4rem;
      color: #fff;
      margin-bottom: 8px;
    }
    .envelope-info .from-text {
      color: rgba(200, 200, 230, 0.5);
      font-size: 0.88rem;
      margin-bottom: 4px;
    }
    .envelope-info .sender-name {
      color: #c8b6ff;
      font-weight: 600;
      font-size: 1rem;
    }
    .envelope-info .date-text {
      color: rgba(200, 200, 230, 0.3);
      font-size: 0.75rem;
      margin-top: 8px;
    }

    /* Lock notice */
    .lock-notice {
      margin-top: 32px;
      padding: 24px;
      background: rgba(200, 182, 255, 0.03);
      border: 1px solid rgba(200, 182, 255, 0.12);
      border-radius: 16px;
      text-align: center;
    }
    .lock-notice .lock-icon {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .lock-notice h2 {
      font-size: 1rem;
      color: #e8e4f0;
      margin-bottom: 8px;
    }
    .lock-notice p {
      font-size: 0.85rem;
      color: rgba(200, 200, 230, 0.5);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #c8b6ff, #88b4ff);
      color: #0a0a2e;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200, 182, 255, 0.3); }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      background: rgba(200, 182, 255, 0.06);
      border: 1px solid rgba(200, 182, 255, 0.15);
      color: #c8b6ff;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 12px;
    }
    .btn-secondary:hover { background: rgba(200, 182, 255, 0.1); }

    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0;
      color: rgba(200, 200, 230, 0.3);
      font-size: 0.8rem;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(200, 182, 255, 0.1);
    }

    /* Reply form */
    .reply-section {
      display: none;
      animation: fadeUp 0.5s ease-out;
    }
    .reply-section.active { display: block; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    textarea {
      width: 100%;
      padding: 14px 16px;
      background: rgba(200, 182, 255, 0.04);
      border: 1px solid rgba(200, 182, 255, 0.15);
      border-radius: 12px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
      margin-bottom: 8px;
      min-height: 160px;
      resize: vertical;
      line-height: 1.8;
    }
    textarea:focus { border-color: rgba(200, 182, 255, 0.4); }
    textarea::placeholder { color: rgba(200, 200, 230, 0.3); }

    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: rgba(200, 200, 230, 0.3);
      margin-bottom: 16px;
    }

    /* Opening animation */
    .opening-scene {
      display: none;
      text-align: center;
      padding: 60px 0;
    }
    .opening-scene.active { display: block; }

    @keyframes envelopeOpen {
      0% { transform: scale(1); }
      30% { transform: scale(1.1); }
      50% { transform: scale(1.2) rotateX(0deg); }
      70% { transform: scale(1.1) rotateX(-20deg); opacity: 0.8; }
      100% { transform: scale(0.8) rotateX(-40deg) translateY(-50px); opacity: 0; }
    }
    .envelope-opening {
      font-size: 5rem;
      display: inline-block;
      animation: envelopeOpen 2s ease-in-out forwards;
    }

    @keyframes letterSlide {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Letter revealed */
    .letter-revealed {
      display: none;
      animation: letterSlide 0.8s ease-out;
    }
    .letter-revealed.active { display: block; }

    .letter-paper {
      background: rgba(200, 182, 255, 0.03);
      border: 1px solid rgba(200, 182, 255, 0.12);
      border-radius: 20px;
      padding: 32px 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .letter-paper::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #c8b6ff, #88b4ff, #ffd6e0);
    }

    .letter-header {
      text-align: center;
      margin-bottom: 20px;
      font-size: 0.72rem;
      color: rgba(200, 182, 255, 0.4);
      letter-spacing: 2px;
    }

    .letter-greeting {
      font-size: 0.88rem;
      color: rgba(200, 200, 230, 0.6);
      margin-bottom: 16px;
    }
    .letter-greeting span { color: #c8b6ff; }

    .letter-body {
      font-size: 1rem;
      line-height: 2;
      color: #e8e4f0;
      white-space: pre-wrap;
      margin-bottom: 20px;
    }

    .letter-signature {
      text-align: right;
      font-size: 0.88rem;
      color: rgba(200, 200, 230, 0.6);
    }
    .letter-signature span { color: #c8b6ff; }

    .reply-letter-paper {
      background: rgba(255, 214, 224, 0.03);
      border: 1px solid rgba(255, 214, 224, 0.12);
      border-radius: 20px;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }
    .reply-letter-paper::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ffd6e0, #c8b6ff, #88b4ff);
    }

    .both-label {
      text-align: center;
      margin: 20px 0;
      font-size: 0.82rem;
      color: rgba(200, 200, 230, 0.4);
    }

    .cta-area {
      text-align: center;
      margin-top: 32px;
    }
    .cta-area p {
      font-size: 0.85rem;
      color: rgba(200, 200, 230, 0.5);
      margin-bottom: 16px;
    }

    .footer {
      text-align: center; margin-top: 50px; padding-bottom: 40px;
      color: rgba(200, 200, 230, 0.3); font-size: 0.8rem;
    }
    .footer a { color: rgba(200, 182, 255, 0.5); text-decoration: none; }

    .error-msg {
      text-align: center;
      padding: 60px 20px;
    }
    .error-msg h2 { color: #c8b6ff; margin-bottom: 12px; }
    .error-msg p { color: rgba(200,200,230,0.5); margin-bottom: 24px; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cosmos"></div>
  <div class="stars"></div>

  <div class="container">
    <!-- Loading -->
    <div id="loadingState" style="text-align:center;padding:80px 0">
      <div style="font-size:2rem;animation:envelopeFloat 2s ease-in-out infinite">&#9993;</div>
      <p style="color:rgba(200,200,230,0.4);margin-top:16px;font-size:0.85rem">正在從宇宙取回信件...</p>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorState" style="display:none">
      <h2>找不到這封信</h2>
      <p>這封信可能已經過期或連結有誤</p>
      <a href="/letter.html" class="btn-primary" style="display:inline-block;padding:14px 32px;text-decoration:none;width:auto">寫一封新的信</a>
    </div>

    <!-- Envelope scene (locked) -->
    <div id="envelopeScene" style="display:none">
      <div class="envelope-scene">
        <div class="envelope-big">&#9993;</div>
        <div class="envelope-info">
          <h1>你有一封宇宙來信</h1>
          <div class="from-text">來自</div>
          <div class="sender-name" id="displaySender"></div>
          <div class="date-text" id="displayDate"></div>
        </div>
      </div>

      <div class="lock-notice" id="lockNotice">
        <div class="lock-icon">&#128274;</div>
        <h2>這封信被宇宙封印了</h2>
        <p><span id="lockSender" style="color:#c8b6ff"></span> 寫了一封信給你<br>但你必須<strong style="color:#c8b6ff">也回一封信</strong>，宇宙才會同時拆開兩封</p>

        <button class="btn-primary" onclick="showReplyForm()">&#9997; 回一封信</button>

        <div class="or-divider">或</div>

        <button class="btn-secondary" onclick="payToUnlock()">&#128275; 付費解鎖（NT$49）</button>
      </div>

      <!-- Reply form -->
      <div class="reply-section" id="replySection">
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:0.82rem;color:rgba(200,200,230,0.5)">回信給 <span id="replySender" style="color:#c8b6ff"></span></div>
        </div>
        <textarea id="replyContent" placeholder="我也有話想對你說..." maxlength="500"></textarea>
        <div class="char-count"><span id="replyCharCount">0</span> / 500</div>

        <button class="btn-primary" onclick="submitReply()">&#10024; 送出回信，解鎖宇宙來信</button>
        <button class="btn-secondary" onclick="hideReplyForm()">取消</button>
      </div>
    </div>

    <!-- Opening animation -->
    <div class="opening-scene" id="openingScene">
      <div class="envelope-opening">&#9993;</div>
      <p style="color:rgba(200,200,230,0.5);margin-top:20px;font-size:0.88rem;animation:fadeUp 0.5s ease-out 1.5s both">宇宙正在拆開你們的信...</p>
    </div>

    <!-- Letters revealed -->
    <div class="letter-revealed" id="letterRevealed">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:2rem;margin-bottom:8px">&#10024;</div>
        <h2 style="font-size:1.2rem;color:#c8b6ff">宇宙的信拆開了</h2>
      </div>

      <!-- Original letter -->
      <div class="letter-paper">
        <div class="letter-header">&#10024; <span id="revealSender2"></span> 的來信 &#10024;</div>
        <div class="letter-greeting">親愛的 <span id="revealReceiver"></span>，</div>
        <div class="letter-body" id="revealContent"></div>
        <div class="letter-signature">— <span id="revealSender"></span></div>
      </div>

      <!-- Reply letter (if unlocked via reply) -->
      <div id="replyLetterContainer" style="display:none">
        <div class="both-label">&#8595; 你的回信 &#8595;</div>
        <div class="reply-letter-paper">
          <div class="letter-header">&#10024; <span id="revealReplyFrom"></span> 的回信 &#10024;</div>
          <div class="letter-greeting">親愛的 <span id="revealReplySender"></span>，</div>
          <div class="letter-body" id="revealReplyContent"></div>
          <div class="letter-signature">— <span id="revealReplyFrom2"></span></div>
        </div>
      </div>

      <div class="cta-area">
        <p>宇宙見證了你們的心意</p>
        <a href="/letter.html" class="btn-primary" style="display:inline-block;padding:14px 32px;text-decoration:none;width:auto">也寫一封宇宙來信</a>
        <div style="margin-top:12px">
          <a href="/" style="color:rgba(200,182,255,0.5);font-size:0.85rem;text-decoration:none">或測測你的挽回指數 &rarr;</a>
        </div>
      </div>
    </div>

    <div class="footer">
      <a href="/">挽回分析</a> &middot; <a href="/cards.html">宇宙的一句話</a> &middot; <a href="/fortune.html">觀音靈籤</a>
      <p style="margin-top:12px">Can We Back? &copy; 2026</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const letterId = params.get('id')
    const paidUnlock = params.get('unlocked') === '1'
    let letterData = null

    document.getElementById('replyContent').addEventListener('input', function() {
      document.getElementById('replyCharCount').textContent = this.value.length
    })

    async function loadLetter() {
      if (!letterId) {
        showError()
        return
      }

      // If returning from payment, confirm unlock first
      if (paidUnlock) {
        try {
          await fetch('/api/webhook/letter', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ letterId }),
          })
        } catch {}
      }

      try {
        const res = await fetch('/api/letter/' + letterId)
        const data = await res.json()

        if (data.error) {
          showError()
          return
        }

        letterData = data
        document.getElementById('loadingState').style.display = 'none'

        if (data.unlocked) {
          showRevealedLetter(data)
        } else {
          showLockedEnvelope(data)
        }
      } catch {
        showError()
      }
    }

    function showError() {
      document.getElementById('loadingState').style.display = 'none'
      document.getElementById('errorState').style.display = 'block'
    }

    function showLockedEnvelope(data) {
      document.getElementById('displaySender').textContent = data.senderName
      document.getElementById('displayDate').textContent = formatDate(data.createdAt)
      document.getElementById('lockSender').textContent = data.senderName
      document.getElementById('replySender').textContent = data.senderName
      document.getElementById('envelopeScene').style.display = 'block'
    }

    function showReplyForm() {
      document.getElementById('lockNotice').style.display = 'none'
      document.getElementById('replySection').classList.add('active')
    }

    function hideReplyForm() {
      document.getElementById('replySection').classList.remove('active')
      document.getElementById('lockNotice').style.display = 'block'
    }

    async function submitReply() {
      const content = document.getElementById('replyContent').value.trim()
      if (!content) {
        document.getElementById('replyContent').style.borderColor = 'rgba(255,100,100,0.5)'
        return
      }

      try {
        const res = await fetch('/api/letter/' + letterId + '/reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content }),
        })
        const data = await res.json()

        if (data.success) {
          // Show opening animation
          document.getElementById('envelopeScene').style.display = 'none'
          document.getElementById('openingScene').classList.add('active')

          setTimeout(() => {
            document.getElementById('openingScene').classList.remove('active')
            showRevealedLetter({
              ...letterData,
              unlocked: true,
              reply: { content, from: letterData.receiverName || '你' },
            })
          }, 3000)
        } else {
          alert(data.error || '回信失敗')
        }
      } catch {
        alert('網路錯誤，請重試')
      }
    }

    async function payToUnlock() {
      try {
        const res = await fetch('/api/letter/' + letterId + '/pay', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        })
        const data = await res.json()

        if (data.checkoutUrl) {
          window.location.href = data.checkoutUrl
        } else if (data.success) {
          // Direct unlock (free/dev mode)
          document.getElementById('envelopeScene').style.display = 'none'
          document.getElementById('openingScene').classList.add('active')
          setTimeout(() => {
            document.getElementById('openingScene').classList.remove('active')
            showRevealedLetter({ ...letterData, unlocked: true })
          }, 3000)
        } else {
          alert(data.error || '付款失敗')
        }
      } catch {
        alert('網路錯誤，請重試')
      }
    }

    function showRevealedLetter(data) {
      document.getElementById('revealSender').textContent = data.senderName
      document.getElementById('revealSender2').textContent = data.senderName
      document.getElementById('revealReceiver').textContent = data.receiverName || '你'
      document.getElementById('revealContent').textContent = data.content

      if (data.reply) {
        document.getElementById('replyLetterContainer').style.display = 'block'
        document.getElementById('revealReplyFrom').textContent = data.reply.from || data.receiverName || '你'
        document.getElementById('revealReplyFrom2').textContent = data.reply.from || data.receiverName || '你'
        document.getElementById('revealReplySender').textContent = data.senderName
        document.getElementById('revealReplyContent').textContent = data.reply.content
      }

      document.getElementById('letterRevealed').classList.add('active')
    }

    function formatDate(iso) {
      if (!iso) return ''
      const d = new Date(iso)
      return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate()
    }

    loadLetter()
  </script>
</body>
</html>
